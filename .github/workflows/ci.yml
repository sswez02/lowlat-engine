name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build-${{ matrix.compiler }}-${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure
        env:
          CC: ${{ matrix.compiler == 'gcc' && 'gcc-13' || 'clang-18' }}
          CXX: ${{ matrix.compiler == 'gcc' && 'g++-13' || 'clang++-18' }}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build -j

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          find engine tests benchmarks \( -name '*.cpp' -o -name '*.h' \) \
            -exec clang-format --dry-run --Werror {} +

  tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-tidy
      - name: Configure
        run: cmake -S . -B build -G Ninja
      - name: Run clang-tidy
        run: |
          find engine tests benchmarks \( -name '*.cpp' -o -name '*.h' \) -print \
            | xargs clang-tidy -p build/ --warnings-as-errors='*'
